
以下是完整重構後的程式碼，設計語言融合了 **It's Nice That** 的編輯排版美學與 **Center for Humane Technology** 的人道數位設計哲學——強化了視覺層次、版面呼吸感、微互動細節，並修正了原始程式碼中的 JavaScript 語法錯誤。

```html
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EMPATH — Every Moment As Truth Heals</title>
<meta property="og:title" content="EMPATH — Every Moment As Truth Heals" />
<meta property="og:description" content="數位時代的情緒安放平台。承認、安放、修補、釋放、交換、回家。以文學敘事對抗視覺霸權的設計實踐。" />
<meta property="og:type" content="website" />
<meta property="og:image" content="https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=1200&auto=format&fit=crop" />
<meta name="twitter:card" content="summary_large_image" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Noto+Serif+TC:wght@300;400;700&family=Noto+Sans+TC:wght@300;400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
/* ============================================================
   EMPATH — Design System
   Inspired by It's Nice That editorial clarity +
   Center for Humane Technology calm-tech ethics
   ============================================================ */

:root {
  /* Core Palette */
  --ink:     #08101A;
  --ink2:    #0D1B2A;
  --ink3:    #060D17;
  --paper:   #F4F0E8;
  --fog:     #B8C0CC;
  --mist:    #7A8A9A;
  --ghost:   rgba(255,255,255,0.07);

  /* Accent */
  --gold:    #C9A84C;
  --gold2:   #ECC97A;
  --amber:   #D4896A;
  --dawn:    #EEE4D2;

  /* Room Colors */
  --col-e:   #6E8FAD;
  --col-m:   #9BB0C8;
  --col-p:   #C9A84C;
  --col-a:   #6A9B9C;
  --col-t:   #C8825A;
  --col-h:   #D4C9B8;

  /* Typography */
  --font-serif:  'Cormorant Garamond', Georgia, serif;
  --font-jp:     'Noto Serif TC', serif;
  --font-sans:   'Inter', 'Noto Sans TC', sans-serif;

  /* Spacing System (8pt grid) */
  --sp-1: 8px;   --sp-2: 16px;  --sp-3: 24px;
  --sp-4: 32px;  --sp-5: 48px;  --sp-6: 64px;
  --sp-7: 96px;  --sp-8: 128px;

  /* Border Radius */
  --radius-sm: 3px;
  --radius-md: 6px;
  --radius-lg: 12px;
  --radius-pill: 100px;

  /* Transitions */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
  --dur-fast: 0.18s;
  --dur-mid: 0.35s;
  --dur-slow: 0.65s;

  /* Shadows */
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.5), 0 2px 6px rgba(0,0,0,0.3);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.7), 0 4px 12px rgba(0,0,0,0.4);
  --shadow-glow-gold: 0 0 24px rgba(201,168,76,0.25);
}

/* ── Reset & Base ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; font-size: 16px; }

body {
  background: var(--ink);
  color: var(--fog);
  font-family: var(--font-sans);
  font-weight: 300;
  line-height: 1.6;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background var(--dur-slow) var(--ease-in-out),
              color var(--dur-slow) var(--ease-in-out);
}

a { text-decoration: none; color: inherit; }
img { max-width: 100%; display: block; }
button { border: none; background: none; cursor: pointer; font-family: inherit; }

/* ── HSP Calm Mode ── */
body.hsp-mode {
  --fog: rgba(184, 192, 204, 0.6);
  --gold: rgba(201, 168, 76, 0.55);
  --amber: rgba(212, 137, 106, 0.55);
  background: #050A10;
}
body.hsp-mode *  { animation-play-state: paused !important; }
body.hsp-mode .warmth-pulse,
body.hsp-mode .shard-glow { opacity: 0 !important; }
body.hsp-mode .room-desc { color: rgba(184,192,204,0.5) !important; }

/* ============================================================
   NAVIGATION
   ============================================================ */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 900;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: var(--sp-3);
  padding: 0 var(--sp-5);
  height: 60px;
  background: rgba(5, 10, 18, 0.96);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.nav-logo {
  font-family: var(--font-serif);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 8px;
  color: rgba(255,255,255,0.9);
  text-transform: uppercase;
  white-space: nowrap;
}

.nav-center {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}

.nav-letter {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 34px;
  height: 34px;
  font-family: var(--font-serif);
  font-size: 15px;
  font-weight: 600;
  color: var(--mist);
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  transition:
    color var(--dur-mid) var(--ease-out),
    border-color var(--dur-mid) var(--ease-out),
    background var(--dur-mid) var(--ease-out),
    transform var(--dur-fast) var(--ease-out);
}
.nav-letter:hover { transform: translateY(-2px); }
.nav-letter[data-l="E"] { color: var(--col-e); }
.nav-letter[data-l="E"]:hover { border-color: var(--col-e); background: rgba(110,143,173,0.12); }
.nav-letter[data-l="M"] { color: var(--col-m); }
.nav-letter[data-l="M"]:hover { border-color: var(--col-m); background: rgba(155,176,200,0.12); }
.nav-letter[data-l="P"] { color: var(--col-p); }
.nav-letter[data-l="P"]:hover { border-color: var(--col-p); background: rgba(201,168,76,0.12); }
.nav-letter[data-l="A"] { color: var(--col-a); }
.nav-letter[data-l="A"]:hover { border-color: var(--col-a); background: rgba(106,155,156,0.12); }
.nav-letter[data-l="T"] { color: var(--col-t); }
.nav-letter[data-l="T"]:hover { border-color: var(--col-t); background: rgba(200,130,90,0.12); }
.nav-letter[data-l="H"] { color: var(--col-h); }
.nav-letter[data-l="H"]:hover { border-color: var(--col-h); background: rgba(212,201,184,0.12); }

.nav-controls {
  display: flex;
  align-items: center;
  gap: var(--sp-1);
}

.nav-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  height: 30px;
  padding: 0 12px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--radius-pill);
  font-size: 10px;
  letter-spacing: 1.5px;
  font-weight: 400;
  color: var(--mist);
  background: transparent;
  cursor: pointer;
  transition: all var(--dur-mid) var(--ease-out);
  white-space: nowrap;
}
.nav-pill:hover {
  border-color: rgba(255,255,255,0.3);
  color: var(--fog);
  background: rgba(255,255,255,0.05);
}
.nav-pill.active {
  background: var(--gold);
  border-color: var(--gold);
  color: #000;
  font-weight: 500;
}
.lang-divider {
  width: 1px;
  height: 16px;
  background: rgba(255,255,255,0.1);
  margin: 0 2px;
}

/* ============================================================
   HERO SECTION
   ============================================================ */
#hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 120px var(--sp-5) var(--sp-6);
  position: relative;
  overflow: hidden;
}

/* Ambient background gradient */
#hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 50% 0%, rgba(201,168,76,0.04) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 20% 80%, rgba(110,143,173,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 80% 80%, rgba(106,155,156,0.04) 0%, transparent 60%);
  pointer-events: none;
}

.hero-wordmark {
  position: absolute;
  font-family: var(--font-serif);
  font-size: 28vw;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: transparent;
  -webkit-text-stroke: 1px rgba(255,255,255,0.025);
  pointer-events: none;
  user-select: none;
  line-height: 0.85;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -48%);
  white-space: nowrap;
  z-index: 0;
}

.hero-content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.hero-eyebrow {
  font-size: 10px;
  letter-spacing: 5px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: var(--sp-3);
  opacity: 0.8;
  animation: fadeUp 1s var(--ease-out) 0.1s both;
}

.hero-title {
  font-family: var(--font-serif);
  font-size: clamp(68px, 13vw, 148px);
  font-weight: 300;
  color: rgba(255,255,255,0.95);
  letter-spacing: 22px;
  line-height: 0.9;
  margin-bottom: var(--sp-4);
  animation: fadeUp 1s var(--ease-out) 0.2s both;
}

.hero-tagline {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: clamp(14px, 2vw, 19px);
  color: var(--gold);
  letter-spacing: 2px;
  margin-bottom: var(--sp-2);
  font-weight: 300;
  animation: fadeUp 1s var(--ease-out) 0.35s both;
}

.hero-descriptor {
  font-size: 10px;
  letter-spacing: 2.5px;
  color: var(--mist);
  margin-bottom: var(--sp-5);
  animation: fadeUp 1s var(--ease-out) 0.45s both;
}

/* ── Hero Rule ── */
.hero-rule {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  width: 100%;
  max-width: 480px;
  margin-bottom: var(--sp-5);
  animation: fadeUp 1s var(--ease-out) 0.5s both;
}
.hero-rule::before, .hero-rule::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
}
.hero-rule-text {
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--mist);
  white-space: nowrap;
}

/* ── Quotes ── */
.hero-quotes {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: var(--sp-3);
  max-width: 600px;
  margin-bottom: var(--sp-5);
  animation: fadeUp 1s var(--ease-out) 0.55s both;
}

.hero-quote {
  padding: var(--sp-3);
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius-md);
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 12px;
  color: var(--mist);
  line-height: 1.9;
  text-align: left;
  transition: border-color var(--dur-mid) var(--ease-out);
}
.hero-quote:hover { border-color: rgba(255,255,255,0.12); }
.hero-quote cite {
  display: block;
  margin-top: var(--sp-1);
  font-style: normal;
  font-size: 9px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.25);
}

/* ── Onboarding ── */
.onboarding-card {
  max-width: 520px;
  margin: 0 auto var(--sp-5);
  padding: var(--sp-4) var(--sp-4);
  background: rgba(255,255,255,0.025);
  border: 1px dashed rgba(255,255,255,0.12);
  border-radius: var(--radius-md);
  animation: fadeUp 1s var(--ease-out) 0.6s both;
}
.onboarding-card p {
  font-size: 13px;
  line-height: 2.3;
  color: var(--dawn);
  letter-spacing: 0.5px;
  font-weight: 300;
}

/* ── Door Navigation ── */
.doors-grid {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: var(--sp-4);
  animation: fadeUp 1s var(--ease-out) 0.7s both;
}

.door-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 9px;
  padding: 20px 16px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition:
    transform var(--dur-mid) var(--ease-out),
    border-color var(--dur-mid) var(--ease-out),
    background var(--dur-mid) var(--ease-out),
    box-shadow var(--dur-mid) var(--ease-out);
  min-width: 84px;
  position: relative;
  overflow: hidden;
}
.door-btn::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  opacity: 0;
  transition: opacity var(--dur-mid) var(--ease-out);
}
.door-btn:hover { transform: translateY(-4px); background: rgba(255,255,255,0.055); }
.door-btn:hover::after { opacity: 1; }

.door-letter {
  font-family: var(--font-serif);
  font-size: 28px;
  font-weight: 600;
  line-height: 1;
}
.door-label {
  font-size: 9px;
  letter-spacing: 1.5px;
  color: var(--mist);
}

.door-btn[data-d="E"] .door-letter { color: var(--col-e); }
.door-btn[data-d="E"]:hover { border-color: var(--col-e); box-shadow: 0 6px 24px rgba(110,143,173,0.2); }
.door-btn[data-d="E"]::after { background: var(--col-e); }
.door-btn[data-d="M"] .door-letter { color: var(--col-m); }
.door-btn[data-d="M"]:hover { border-color: var(--col-m); box-shadow: 0 6px 24px rgba(155,176,200,0.2); }
.door-btn[data-d="M"]::after { background: var(--col-m); }
.door-btn[data-d="P"] .door-letter { color: var(--col-p); }
.door-btn[data-d="P"]:hover { border-color: var(--col-p); box-shadow: 0 6px 24px rgba(201,168,76,0.2); }
.door-btn[data-d="P"]::after { background: var(--col-p); }
.door-btn[data-d="A"] .door-letter { color: var(--col-a); }
.door-btn[data-d="A"]:hover { border-color: var(--col-a); box-shadow: 0 6px 24px rgba(106,155,156,0.2); }
.door-btn[data-d="A"]::after { background: var(--col-a); }
.door-btn[data-d="T"] .door-letter { color: var(--col-t); }
.door-btn[data-d="T"]:hover { border-color: var(--col-t); box-shadow: 0 6px 24px rgba(200,130,90,0.2); }
.door-btn[data-d="T"]::after { background: var(--col-t); }
.door-btn[data-d="H"] .door-letter { color: var(--col-h); }
.door-btn[data-d="H"]:hover { border-color: var(--col-h); box-shadow: 0 6px 24px rgba(212,201,184,0.2); }
.door-btn[data-d="H"]::after { background: var(--col-h); }

.flow-caption {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--mist);
  margin-bottom: var(--sp-2);
  animation: fadeUp 1s var(--ease-out) 0.75s both;
}

.scroll-indicator {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--mist);
  opacity: 0.5;
  animation: breathe 3s ease-in-out infinite, fadeUp 1s var(--ease-out) 0.9s both;
}
.scroll-indicator span { font-size: 14px; }

/* ============================================================
   ROOM — SHARED STYLES
   ============================================================ */
.room {
  min-height: 100vh;
  padding: 112px var(--sp-5) var(--sp-7);
  position: relative;
  overflow: hidden;
}

.room-bg-letter {
  position: absolute;
  top: 80px;
  right: var(--sp-5);
  font-family: var(--font-serif);
  font-size: clamp(100px, 18vw, 200px);
  font-weight: 600;
  line-height: 0.9;
  opacity: 0.04;
  pointer-events: none;
  user-select: none;
  letter-spacing: -0.02em;
}

.room-body { position: relative; z-index: 1; }

/* Room Header */
.room-eyebrow {
  font-size: 9px;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 10px;
  font-weight: 400;
}

.room-heading {
  font-family: var(--font-jp);
  font-weight: 700;
  font-size: clamp(22px, 3.5vw, 36px);
  color: rgba(255,255,255,0.92);
  margin-bottom: var(--sp-2);
  line-height: 1.2;
}

.room-lede {
  font-size: 13px;
  color: var(--mist);
  line-height: 2.1;
  max-width: 500px;
  margin-bottom: var(--sp-4);
  cursor: pointer;
  padding: 14px 18px 14px 20px;
  background: rgba(255,255,255,0.025);
  border-left: 2px solid rgba(255,255,255,0.1);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  transition: all var(--dur-mid) var(--ease-out);
  position: relative;
}
.room-lede::after {
  content: '🔊';
  font-size: 9px;
  opacity: 0;
  margin-left: 6px;
  transition: opacity var(--dur-mid);
}
.room-lede:hover {
  color: var(--dawn);
  background: rgba(255,255,255,0.045);
  border-left-color: var(--dawn);
}
.room-lede:hover::after { opacity: 0.4; }

/* ── Textarea ── */
.field {
  width: 100%;
  max-width: 580px;
  min-height: 120px;
  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-md);
  color: rgba(255,255,255,0.88);
  font-family: var(--font-jp);
  font-size: 13px;
  font-weight: 300;
  padding: 18px 20px;
